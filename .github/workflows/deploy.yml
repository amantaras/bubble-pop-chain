name: Deploy to production

# Production gate: this workflow ONLY runs after the CI workflow has
# completed successfully on the default branch (master). If any unit or
# E2E test fails, CI is red and this deploy never starts.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  android:
    name: Android signed APK
    # Guard: require the triggering CI run to have succeeded.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - name: Ensure Android SDK 35 is installed
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - run: npm ci
      - name: Require Android signing secrets
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"
      - name: Decode Android keystore
        run: |
          mkdir -p "$RUNNER_TEMP/android-signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-signing/release.jks"
      - name: Build signed Android APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-signing/release.jks
        run: npm run android:apk:release
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: bubblit-signed-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  ios:
    name: iOS unsigned build
    # Guard: require the triggering CI run to have succeeded.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build iOS without signing
        run: npm run ios:build
      - name: Upload iOS app bundle
        uses: actions/upload-artifact@v4
        with:
          name: bubble-pop-chain-ios-app
          path: ios/App/build/Build/Products/Debug-iphoneos/App.app
          if-no-files-found: error

  deploy:
    name: Publish to GitHub Pages
    # Guard: require the triggering CI run to have succeeded.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}
    needs: [android, ios]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build static web artifact
        run: npm run build:web
      - name: Add Android APK download
        uses: actions/download-artifact@v4
        with:
          name: bubblit-signed-apk
          path: dist/web/downloads
      - name: Publish stable Android APK filename
        run: |
          mv dist/web/downloads/app-release.apk dist/web/downloads/bubblit.apk
          shasum -a 256 dist/web/downloads/bubblit.apk > dist/web/downloads/bubblit.apk.sha256
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages if it isn't already configured, so the deploy
          # is self-healing and doesn't fail with "Get Pages site failed".
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish only the generated web bundle so native platform projects
          # and development files never become part of the Pages artifact.
          path: "dist/web"
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
