name: Deploy to production

# Production gate: this workflow ONLY runs after the CI workflow has
# completed successfully on the default branch (master). If any unit or
# E2E test fails, CI is red and this deploy never starts.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish to GitHub Pages
    # Guard: require the triggering CI run to have succeeded.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static web artifact
        run: npm run build:web
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages if it isn't already configured, so the deploy
          # is self-healing and doesn't fail with "Get Pages site failed".
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish only the generated web bundle so native platform projects
          # and development files never become part of the Pages artifact.
          path: "dist/web"
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
